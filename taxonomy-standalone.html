<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taxonomy Explorer</title>
<link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775830255/Kerv-Logo-1-1_bl2xdt.jpg"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/style.css"/>
<style>
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; }
  .sa-wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 48px 48px;
  }
  .sa-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .sa-logo {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sa-logo img { width: 100%; height: 100%; object-fit: contain; }
  .sa-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -.2px;
  }
</style>
</head>
<body>

<div class="sa-wrap">
  <div class="sa-header">
    <div class="sa-logo">
      <img src="https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775830255/Kerv-Logo-1-1_bl2xdt.jpg" alt="Kerv"/>
    </div>
    <span class="sa-title">Sales Demo Tool</span>
  </div>
  <div class="ptitle" style="margin-bottom:8px">Content Library</div>

  <div id="sdt-panel-taxonomy">
    <div class="cs-card">
      <div class="cs-toolbar">
        <div class="cs-filter-wrap">
          <div class="cs-filter-label">Category</div>
          <select class="cs-filter-select" onchange="csTxFilter(this.value)">
            <option value="all">All</option>
            <option value="comedy">Comedy</option>
            <option value="drama">Drama</option>
            <option value="reality">Reality</option>
            <option value="documentary">Documentary</option>
          </select>
        </div>
        <button class="cs-request-btn" onclick="csOpenModalTaxonomy()">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          Request New Content
        </button>
      </div>
      <div class="cs-grid" id="cs-grid4"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="/js/config.js"></script>
<script src="/js/loader.js"></script>
<script src="/js/taxonomy-explorer.js"></script>
<script src="/js/sdt-content-form.js"></script>
<script>
  // Stub app.js globals used by sdt-content-form.js
  var activeId    = 'taxonomy-v1';
  var initiatives = [];
  var collapsed   = false;

  // Remove "Content Selection" title when going back to grid (standalone only)
  var _origBackToGrid = csBackToGrid;
  csBackToGrid = function() {
    _origBackToGrid.apply(this, arguments);
    var title = document.querySelector('#sdt-panel-taxonomy .cs-title');
    if (title) title.remove();
  };

  window.addEventListener('load', function() {
    csActiveTxFilter = 'all';
    csSelectedTxId   = 1;
    sdtInjectStyles();
    csTxRender();
    csTxRenderProcess();
  });
</script>

</body>
</html>
