<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taxonomy Explorer</title>
<link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775830255/Kerv-Logo-1-1_bl2xdt.jpg"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/style.css"/>
<style>
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; }
  .sa-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 32px 48px;
  }
  .sa-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .sa-logo {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sa-logo img { width: 100%; height: 100%; object-fit: contain; }
  .sa-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -.2px;
  }
</style>
</head>
<body>

<div class="sa-wrap">
  <div class="sa-header">
    <div class="sa-logo">
      <img src="https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775830255/Kerv-Logo-1-1_bl2xdt.jpg" alt="Kerv"/>
    </div>
    <span class="sa-title">Taxonomy Explorer</span>
  </div>
  <div id="content"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="/js/config.js"></script>
<script src="/js/loader.js"></script>
<script src="/js/taxonomy-explorer.js"></script>
<script src="/js/sdt-content-form.js"></script>
<script>
  // Stub app.js globals used by sdt-content-form.js
  var activeId    = 'taxonomy-v1';
  var initiatives = [];
  var collapsed   = false;

  window.addEventListener('load', function() {
    document.getElementById('content').innerHTML = renderTaxonomyV1();
  });
</script>

</body>
</html>
